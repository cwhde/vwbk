name: Build and Release (Gitea)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Replace Version String
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Bumping version in files to: $TAG_NAME"
          sed -i "s/VWBK_VERSION=\"DEV\"/VWBK_VERSION=\"$TAG_NAME\"/g" install.sh
          sed -i "s/VERSION=\"DEV\"/VERSION=\"$TAG_NAME\"/g" vwbk

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea Registry
        uses: docker/login-action@v3
        with:
          registry: git.juzo.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            git.juzo.io/juzo/vwbk:latest
            git.juzo.io/juzo/vwbk:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64

  create-gitea-release:
    runs-on: ubuntu-latest
    needs: build-and-publish-docker
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Replace Version String
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          sed -i "s/VWBK_VERSION=\"DEV\"/VWBK_VERSION=\"$TAG_NAME\"/g" install.sh
          sed -i "s/VERSION=\"DEV\"/VERSION=\"$TAG_NAME\"/g" vwbk

      - name: Create Gitea Release
        uses: https://gitea.com/actions/release-action@main
        with:
          files: |-
            vwbk
            install.sh
          api_key: ${{ secrets.GITHUB_TOKEN }}
